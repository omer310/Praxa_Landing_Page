<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Praxa — AI Operating Layer for Builders</title>
    <meta name="description" content="Praxa turns chaotic thought into coordinated action. The operating layer for founders and builders who move fast." />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "accent": "#4ECDC4",
                        "bg": "#151718",
                        "surface": "#1f2123",
                        "rim": "#2C2C2E",
                        "cream": "#ECEDEE",
                        "soft": "#9BA1A6",
                    },
                    fontFamily: {
                        "display": ["Cormorant Garamond", "Georgia", "serif"],
                        "sans": ["DM Sans", "-apple-system", "BlinkMacSystemFont", "sans-serif"],
                    },
                    animation: {
                        "marquee": "marquee 55s linear infinite",
                        "marquee-slow": "marquee 90s linear infinite",
                    },
                    keyframes: {
                        marquee: {
                            "0%": { transform: "translateX(0)" },
                            "100%": { transform: "translateX(-50%)" },
                        },
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        body {
            @apply bg-bg text-cream font-sans antialiased overflow-x-hidden;
        }

        ::selection {
            @apply bg-accent/30 text-cream;
        }

        .section-line {
            @apply border-t border-rim;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
